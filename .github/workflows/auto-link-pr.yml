name: Auto Link PR → Issue

on:
  pull_request:
    branches: [main, develop]
    types: [opened, reopened]

jobs:
  link-issue:
    name: Lembrete de Issue na PR
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Verificar se PR menciona alguma issue
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            const mentionsIssue = /closes?\s+#\d+|fixes?\s+#\d+|resolves?\s+#\d+|refs?\s+#\d+/i.test(body);

            if (mentionsIssue) {
              console.log('✅ PR já menciona uma issue — nenhuma ação necessária.');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  '💡 **Dica:** Esta PR não está vinculada a nenhuma issue.',
                  '',
                  'Se houver uma issue relacionada, adicione no corpo da PR:',
                  '```',
                  'Closes #<numero-da-issue>',
                  '```',
                  'Isso fechará a issue automaticamente quando o merge for feito.',
                ].join('\n'),
              });
              console.log('💬 Comentário de lembrete adicionado à PR.');
            }
